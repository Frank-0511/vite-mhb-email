name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  changes:
    name: Detect changed file types
    runs-on: ubuntu-latest
    outputs:
      md: ${{ steps.filter.outputs.md }}
      html: ${{ steps.filter.outputs.html }}
      js: ${{ steps.filter.outputs.js }}
      json: ${{ steps.filter.outputs.json }}
      css: ${{ steps.filter.outputs.css }}
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            md:
              - "**/*.md"
            html:
              - "src/emails/templates/**/*.html"
            js:
              - "scripts/**/*.js"
              - "src/web/**/*.js"
              - "vite.config.js"
              - "maizzle.config.js"
            json:
              - "src/emails/templates/*/data.json"
            css:
              - "src/**/*.css"
            code:
              - "scripts/**/*.js"
              - "src/web/**/*.js"
              - "src/emails/templates/**/*.html"
              - "src/emails/templates/*/data.json"
              - "src/**/*.css"
              - "vite.config.js"
              - "maizzle.config.js"
              - "tailwind.config.js"
              - "tailwind.email.config.js"
              - "postcss.config.js"
              - "package.json"
              - "bun.lock"
              - "tsconfig.json"

  lint-md:
    name: Lint · Markdown
    needs: changes
    if: needs.changes.outputs.md == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run lint:md

  lint-html:
    name: Lint · HTML
    needs: changes
    if: needs.changes.outputs.html == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run lint:html

  lint-js:
    name: Lint · JavaScript
    needs: changes
    if: needs.changes.outputs.js == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run lint:js

  lint-json:
    name: Lint · JSON
    needs: changes
    if: needs.changes.outputs.json == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run lint:json

  lint-css:
    name: Lint · CSS
    needs: changes
    if: needs.changes.outputs.css == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run lint:css

  verify:
    name: Typecheck · Test · Build
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Test
        run: bun run test
      - name: Build
        run: bun run scripts/build/build.js
