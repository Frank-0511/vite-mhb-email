<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Preview & Edit</title>
    <!-- Use the same Tailwind output -->
    <link href="/css/tailwind.css" rel="stylesheet" />

    <!-- Vanilla JSONEditor (Svelte JSONEditor) -->
    <link
      href="https://cdn.jsdelivr.net/npm/vanilla-jsoneditor@3.11.0/themes/jse-theme-dark.css"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow: hidden;
        display: flex;
      }
      #left-panel {
        width: 35%;
        display: flex;
        flex-direction: column;
        background: #ffffff;
        border-right: 1px solid #e2e8f0;
      }
      #editor-container {
        flex: 1;
        overflow: hidden;
      }
      #right-panel {
        width: 65%;
        display: flex;
        flex-direction: column;
      }
      #preview-iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }

      /* Personalizar el tema claro de Vanilla JSONEditor */
      .jse-theme-default {
        --jse-theme-color: #0ea5e9; /* sky-500 */
        --jse-theme-color-highlight: #0284c7; /* sky-600 */
        --jse-background-color: #ffffff;
        --jse-panel-background: #f8fafc; /* slate-50 */
        --jse-main-border: none;
      }
      /* Personalizar el tema oscuro de Vanilla JSONEditor */
      .jse-theme-dark {
        --jse-theme-color: #38bdf8; /* sky-400 */
        --jse-theme-color-highlight: #0ea5e9; /* sky-500 */
        --jse-background-color: #0f172a; /* slate-900 */
        --jse-panel-background: #1e293b; /* slate-800 */
        --jse-main-border: none;
      }
    </style>
    <script>
      // Prevent FOUC by applying app theme immediately
      if (localStorage.getItem("app-theme") === "dark" || !("app-theme" in localStorage)) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    </script>
  </head>
  <body class="font-sans text-slate-800 bg-slate-50 dark:bg-slate-900 dark:text-slate-200">
    <!-- Aviso de modo oscuro -->
    <div
      id="dark-mode-warning"
      style="
        display: none;
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 9999;
        background: #f87171;
        color: #fff;
        padding: 12px 20px;
        border-radius: 8px;
        font-weight: bold;
        box-shadow: 0 2px 8px #0002;
      "
    >
      ⚠️ El modo oscuro no se refleja en el preview. Puede ser por caché, emulación o clases
      Tailwind.
    </div>
    <!-- Panel Izquierdo: Editor -->
    <div id="left-panel" class="dark:border-slate-700 dark:bg-slate-900">
      <!-- Header del Editor -->
      <div
        class="px-6 py-5 border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 flex justify-between items-center"
      >
        <div class="flex items-center gap-3">
          <a
            href="/"
            class="text-sky-600 dark:text-sky-400 hover:text-sky-700 dark:hover:text-sky-300 font-semibold inline-flex items-center gap-2 transition-colors"
          >
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
          </a>
          <div class="h-5 border-l border-slate-300 dark:border-slate-600"></div>
          <h1 class="text-lg font-bold text-slate-800 dark:text-white flex items-center gap-2 m-0">
            <i data-lucide="file-text" class="w-5 h-5"></i>
            <span id="template-name"></span>
          </h1>
        </div>

        <!-- App Theme Toggle -->
        <theme-toggle></theme-toggle>
      </div>

      <!-- Contenedor del Editor -->
      <div id="editor-container"></div>

      <!-- Acciones Inferiores -->
      <div
        class="px-6 py-5 border-t border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 flex flex-col gap-3"
      >
        <button
          id="btn-save"
          class="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-3 px-4 rounded-lg shadow-sm dark:shadow-lg flex justify-center items-center gap-2 transition-all"
        >
          <i data-lucide="save" class="w-5 h-5"></i>
          <span>Guardar permanentemente en data.json</span>
        </button>
        <button
          id="btn-reset"
          class="w-full bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300 font-semibold py-2 px-4 rounded-lg transition-colors text-sm border border-slate-200 dark:border-transparent"
        >
          Descartar cambios (Recargar)
        </button>
      </div>
    </div>

    <!-- Panel Derecho: Preview -->
    <div id="right-panel" class="bg-slate-100 dark:bg-slate-800">
      <!-- Top bar del iframe -->
      <div
        class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-6 py-3 flex justify-between items-center shadow-sm dark:shadow-slate-900/50 z-10"
      >
        <div class="flex items-center gap-4">
          <span class="font-medium text-slate-700 dark:text-slate-200 flex items-center gap-2">
            <i data-lucide="eye" class="w-4 h-4"></i>
            <span>Vista previa en vivo</span>
          </span>
          <!-- Template Theme Toggle -->
          <button
            id="theme-toggle-template"
            class="p-1 px-2 rounded bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 text-xs font-semibold flex items-center transition-colors border border-slate-200 dark:border-slate-700"
            title="Toggle Template Theme"
          >
            <i id="template-icon-light" data-lucide="sun" class="hidden w-4 h-4 mr-1"></i>
            <i id="template-icon-dark" data-lucide="moon" class="hidden w-4 h-4 mr-1"></i>
            <span>Template</span>
          </button>

          <!-- Viewport Toggle -->
          <div class="flex items-center gap-2" aria-label="Viewport">
            <div
              class="inline-flex overflow-hidden rounded border border-slate-200 dark:border-slate-700"
              role="group"
              aria-label="Viewport selector"
            >
              <button
                id="viewport-desktop"
                type="button"
                class="px-2.5 py-1.5 text-xs font-semibold bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                title="Desktop (600px)"
              >
                Desktop (600px)
              </button>
              <button
                id="viewport-mobile"
                type="button"
                class="px-2.5 py-1.5 text-xs font-semibold bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors border-l border-slate-200 dark:border-slate-700"
                title="Mobile (375px)"
              >
                Mobile (375px)
              </button>
              <button
                id="viewport-custom"
                type="button"
                class="px-2.5 py-1.5 text-xs font-semibold bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors border-l border-slate-200 dark:border-slate-700"
                title="Custom"
              >
                Custom
              </button>
            </div>

            <div id="viewport-custom-input-wrap" class="hidden items-center gap-2">
              <input
                id="viewport-custom-input"
                type="number"
                inputmode="numeric"
                min="280"
                max="1200"
                step="1"
                class="w-24 px-2 py-1 text-xs rounded border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-200 focus:outline-none focus:ring-4 focus:ring-sky-500/10 dark:focus:ring-sky-400/10"
                aria-label="Custom viewport width"
              />
              <span class="text-xs font-semibold text-slate-500 dark:text-slate-400">px</span>
            </div>
          </div>
        </div>
        <span id="sync-status" class="text-green-600 font-medium text-sm flex items-center gap-1">
          <span class="w-2 h-2 rounded-full bg-green-500"></span> Sincronizado
        </span>
      </div>

      <!-- Preview area -->
      <div class="flex-1 overflow-auto">
        <div class="min-h-full flex justify-center p-6">
          <div
            id="preview-frame"
            class="bg-white dark:bg-slate-900 overflow-hidden"
            style="width: 600px"
          >
            <!-- Iframe donde volcaremos el HTML vivo -->
            <iframe id="preview-iframe" title="Template Preview"></iframe>
          </div>
        </div>
      </div>

      <!-- Bottom bar: current width indicator -->
      <div
        class="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 px-6 py-2 text-xs text-slate-600 dark:text-slate-300"
      >
        Ancho actual: <span id="viewport-width-indicator" class="font-semibold">600px</span>
      </div>
    </div>

    <!-- Main App -->
    <script type="module" src="/js/app.js"></script>

    <!-- Lógica de Reactividad y API -->
    <script type="module">
      import { JSONEditor } from "https://cdn.jsdelivr.net/npm/vanilla-jsoneditor@3.11.0/standalone.js";

      const urlParams = new URLSearchParams(window.location.search);
      const templateName = urlParams.get("template");

      if (!templateName) {
        document.body.innerHTML =
          '<div class="p-8 text-red-500 font-bold">Error: No se especificó un template en la URL. (?template=nombre)</div>';
        throw new Error("No template specified");
      }

      document.getElementById("template-name").textContent = templateName;
      const iframe = document.getElementById("preview-iframe");
      const syncStatus = document.getElementById("sync-status");

      // Viewport (preview width) controls
      const viewportDesktopBtn = document.getElementById("viewport-desktop");
      const viewportMobileBtn = document.getElementById("viewport-mobile");
      const viewportCustomBtn = document.getElementById("viewport-custom");
      const viewportCustomInputWrap = document.getElementById("viewport-custom-input-wrap");
      const viewportCustomInput = document.getElementById("viewport-custom-input");
      const previewFrame = document.getElementById("preview-frame");
      const viewportWidthIndicator = document.getElementById("viewport-width-indicator");

      const VIEWPORT_MODE_KEY = "preview-viewport-mode";
      const VIEWPORT_CUSTOM_WIDTH_KEY = "preview-viewport-custom-width";

      const VIEWPORT_PRESETS = {
        desktop: 600,
        mobile: 375,
      };

      function clampWidth(width) {
        const parsed = Number(width);
        if (!Number.isFinite(parsed)) return VIEWPORT_PRESETS.desktop;
        return Math.max(280, Math.min(1200, Math.round(parsed)));
      }

      function setActiveViewportButton(active) {
        const selectedClasses = [
          "bg-sky-500",
          "text-white",
          "hover:bg-sky-600",
          "dark:bg-sky-500",
          "dark:text-white",
          "dark:hover:bg-sky-600",
        ];
        const unselectedClasses = [
          "bg-white",
          "dark:bg-slate-900",
          "text-slate-600",
          "dark:text-slate-300",
          "hover:bg-slate-100",
          "dark:hover:bg-slate-800",
        ];

        const setSelected = (button, isSelected) => {
          button.classList.remove(...selectedClasses, ...unselectedClasses);
          button.classList.add(...(isSelected ? selectedClasses : unselectedClasses));
        };

        setSelected(viewportDesktopBtn, active === "desktop");
        setSelected(viewportMobileBtn, active === "mobile");
        setSelected(viewportCustomBtn, active === "custom");
      }

      function applyViewport(mode, customWidth) {
        const resolvedMode = mode === "mobile" || mode === "custom" ? mode : "desktop";
        const width =
          resolvedMode === "custom" ? clampWidth(customWidth) : VIEWPORT_PRESETS[resolvedMode];

        previewFrame.style.width = `${width}px`;
        viewportWidthIndicator.textContent = `${width}px`;

        viewportCustomInputWrap.classList.toggle("hidden", resolvedMode !== "custom");
        viewportCustomInputWrap.classList.toggle("flex", resolvedMode === "custom");
        if (resolvedMode === "custom") {
          viewportCustomInput.value = String(width);
        }

        setActiveViewportButton(resolvedMode);

        localStorage.setItem(VIEWPORT_MODE_KEY, resolvedMode);
        if (resolvedMode === "custom") {
          localStorage.setItem(VIEWPORT_CUSTOM_WIDTH_KEY, String(width));
        }
      }

      // Restore saved viewport preference
      const savedViewportMode = localStorage.getItem(VIEWPORT_MODE_KEY) || "desktop";
      const savedCustomWidth = localStorage.getItem(VIEWPORT_CUSTOM_WIDTH_KEY) || "600";
      applyViewport(savedViewportMode, savedCustomWidth);

      viewportDesktopBtn.addEventListener("click", () => applyViewport("desktop"));
      viewportMobileBtn.addEventListener("click", () => applyViewport("mobile"));
      viewportCustomBtn.addEventListener("click", () => {
        const storedCustomWidth =
          localStorage.getItem(VIEWPORT_CUSTOM_WIDTH_KEY) || viewportCustomInput.value || "600";
        applyViewport("custom", storedCustomWidth);
      });
      viewportCustomInput.addEventListener("input", () =>
        applyViewport("custom", viewportCustomInput.value),
      );

      // La carga inicial del iframe puede ser simplemente la ruta del template renderizada por vite normal:
      iframe.src = `/templates/${templateName}/index.html`;
      iframe.onload = () => {
        const isTemplateDark = localStorage.getItem("template-theme") === "dark";
        const iframeWin = iframe.contentWindow;
        const iframeDoc = iframeWin.document;
        // Forzar clase 'dark' en el <html> del iframe
        if (isTemplateDark) {
          iframeDoc.documentElement.classList.add("dark");
        } else {
          iframeDoc.documentElement.classList.remove("dark");
        }
        // Espaciado solo en preview
        iframeDoc.body.style.padding = "32px 0";
        // Comprobar si el modo oscuro se refleja
        setTimeout(() => {
          const warning = document.getElementById("dark-mode-warning");
          if (isTemplateDark && !iframeDoc.documentElement.classList.contains("dark")) {
            warning.style.display = "block";
          } else {
            warning.style.display = "none";
          }
        }, 600);
      };

      let editor = null;
      let initialData = {};
      let debounceTimer = null;
      let isFirstChange = true;

      // Theme Management - App theme is handled by themeToggleComponent
      const templateToggleBtn = document.getElementById("theme-toggle-template");
      const templateIconLight = document.getElementById("template-icon-light");
      const templateIconDark = document.getElementById("template-icon-dark");
      const container = document.getElementById("editor-container");

      function updateAppThemeUI() {
        const isDark = document.documentElement.classList.contains("dark");
        container.className = isDark ? "jse-theme-dark" : "jse-theme-default";
      }

      function updateTemplateThemeUI() {
        const isDark =
          localStorage.getItem("template-theme") === "dark" || !("template-theme" in localStorage);
        if (isDark) {
          templateIconLight.classList.add("hidden");
          templateIconDark.classList.remove("hidden");
        } else {
          templateIconLight.classList.remove("hidden");
          templateIconDark.classList.add("hidden");
        }
      }

      // Initial UI sync
      updateAppThemeUI();
      updateTemplateThemeUI();

      // Listen for theme changes from themeToggleComponent
      window.addEventListener("theme-changed", updateAppThemeUI);

      templateToggleBtn.addEventListener("click", () => {
        const currentTheme = localStorage.getItem("template-theme") || "light";
        const newTheme = currentTheme === "dark" ? "light" : "dark";
        localStorage.setItem("template-theme", newTheme);
        updateTemplateThemeUI();

        const iframeWin = iframe.contentWindow;
        const iframeDoc = iframeWin.document;
        if (newTheme === "dark") {
          iframeDoc.documentElement.classList.add("dark");
        } else {
          iframeDoc.documentElement.classList.remove("dark");
        }
      });

      // Helpers de UI
      function setSyncStatus(text, textColor, dotColor) {
        syncStatus.className = `text-sm flex items-center gap-1 ${textColor}`;
        syncStatus.innerHTML = `<span class="w-2 h-2 rounded-full ${dotColor}"></span> ${text}`;
      }

      function updateIframe(htmlContent) {
        const doc = iframe.contentWindow.document;
        doc.open();
        doc.write(htmlContent);
        doc.close();

        // Simular dark mode con matchMedia hack
        const isTemplateDark = localStorage.getItem("template-theme") === "dark";
        if (isTemplateDark) {
          const script = doc.createElement("script");
          script.id = "matchmedia-dark-hack";
          script.textContent = `
            (() => {
              const originalMatchMedia = window.matchMedia;
              window.matchMedia = function(query) {
                if (query === '(prefers-color-scheme: dark)') {
                  return {
                    matches: true,
                    media: query,
                    onchange: null,
                    addListener: () => {},
                    removeListener: () => {},
                    addEventListener: () => {},
                    removeEventListener: () => {},
                    dispatchEvent: () => false
                  };
                }
                return originalMatchMedia.call(window, query);
              };
            })();
          `;
          doc.head.appendChild(script);
        }
        // Espaciado solo en preview
        doc.body.style.padding = "32px 0";

        // Ejecutar event listeners que el iframe o Maizzle pudieran necesitar si tuvieran
        setSyncStatus("Sincronizado", "text-green-600 font-medium", "bg-green-500");
      }

      function scheduleRenderUrl(data) {
        setSyncStatus("Actualizando...", "text-slate-500 font-medium", "bg-slate-400");

        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          fetch(`/api/render?template=${templateName}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          })
            .then((res) => {
              if (!res.ok) throw new Error("Render Failed");
              return res.text();
            })
            .then((html) => updateIframe(html))
            .catch((err) => {
              console.error(err);
              setSyncStatus("Error al renderizar", "text-red-600 font-bold", "bg-red-600");
            });
        }, 300); // Debounce para no saturar al tipear
      }

      editor = new JSONEditor({
        target: container,
        props: {
          content: { json: {} },
          onRenderMenu(items, context) {
            // El modo tabla solo funciona con arreglos de objetos.
            // Para data.json (que es un solo objeto unificado), genera un error.
            // Removemos recursivamente cualquier opción "table" del menú.
            function filterTable(itemList) {
              return itemList
                .filter((item) => item.text !== "table" && item.value !== "table")
                .map((item) => {
                  if (item.items) {
                    return { ...item, items: filterTable(item.items) };
                  }
                  return item;
                });
            }
            return filterTable(items);
          },
          onChange: (updatedContent, previousContent, { contentErrors, patchResult }) => {
            if (isFirstChange) {
              isFirstChange = false;
              return;
            }

            if (contentErrors && contentErrors.length > 0) {
              setSyncStatus("JSON Inválido...", "text-yellow-600 font-medium", "bg-yellow-500");
              return;
            }

            try {
              // Parse el texto si es que está en modo texto o devuelva el obj json
              const json =
                updatedContent.json !== undefined
                  ? updatedContent.json
                  : JSON.parse(updatedContent.text);
              scheduleRenderUrl(json);
            } catch (e) {
              setSyncStatus("JSON Inválido...", "text-yellow-600 font-medium", "bg-yellow-500");
            }
          },
        },
      });

      // Cargar los datos.json físicos al arrancar
      fetch(`/api/data?template=${templateName}`)
        .then((res) => res.json())
        .then((data) => {
          initialData = data;
          editor.updateProps({ content: { json: data } });
          isFirstChange = true;
        })
        .catch((err) => {
          console.error("Error loading data.json", err);
          setSyncStatus("Error de red", "text-red-600 font-medium", "bg-red-500");
        });

      // Descartar cambios
      document.getElementById("btn-reset").addEventListener("click", () => {
        if (
          confirm(
            "¿Seguro que quieres descartar los cambios no guardados? El editor volverá a los valores actuales físicos.",
          )
        ) {
          isFirstChange = true;
          editor.updateProps({ content: { json: initialData } });
          // Forzar refresh recargando la ruta del iframe normal
          iframe.src = `/templates/${templateName}/index.html`;

          iframe.onload = () => {
            const isTemplateDark = localStorage.getItem("template-theme") === "dark";

            if (isTemplateDark) {
              // Inyectar CSS para simular dark mode
              const iframeDoc = iframe.contentWindow.document;
              const styleEl = iframeDoc.createElement("style");
              styleEl.id = "dark-mode-override";
              styleEl.textContent = `
                :root { color-scheme: dark !important; }
              `;
              iframeDoc.head.appendChild(styleEl);
            }

            // Force spacing inside preview only
            iframe.contentWindow.document.body.style.padding = "32px 0";
          };

          setSyncStatus("Sincronizado", "text-green-600 font-medium", "bg-green-500");
        }
      });

      // Guardar a data.json
      document.getElementById("btn-save").addEventListener("click", () => {
        const btn = document.getElementById("btn-save");
        const currentContent = editor.get();

        let parsedData;
        try {
          parsedData =
            currentContent.json !== undefined
              ? currentContent.json
              : JSON.parse(currentContent.text);
        } catch (e) {
          alert("No se puede guardar porque el JSON actual es inválido.");
          return;
        }

        const originalText = btn.innerHTML;

        btn.innerHTML = `<i data-lucide="clock" class="w-5 h-5 inline"></i> <span>Guardando...</span>`;
        btn.disabled = true;

        fetch(`/api/data?template=${templateName}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(parsedData),
        })
          .then((res) => res.json())
          .then((res) => {
            if (res.success) {
              initialData = parsedData; // Ahora este es el nuevo inicial
              btn.innerHTML = `<i data-lucide="check-circle" class="w-5 h-5 inline"></i> <span>¡Guardado con éxito!</span>`;
              btn.classList.replace("bg-sky-500", "bg-emerald-500");
              btn.classList.replace("hover:bg-sky-600", "hover:bg-emerald-600");
              setTimeout(() => {
                btn.innerHTML = originalText;
                btn.classList.replace("bg-emerald-500", "bg-sky-500");
                btn.classList.replace("hover:bg-emerald-600", "hover:bg-sky-600");
                btn.disabled = false;
              }, 2500);
            } else {
              throw new Error("API devolvió success=false");
            }
          })
          .catch((err) => {
            console.error(err);
            alert("Error de red al intentar guardar en data.json");
            btn.innerHTML = originalText;
            btn.disabled = false;
          });
      });
    </script>
  </body>
</html>
