<!doctype html>
<html lang="es" xmlns:v="urn:schemas-microsoft-com:vml">
  <head>
    <meta charset="utf-8" />
    <meta name="x-apple-disable-message-reformatting" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no, url=no" />
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #f4f4f5;
      }
      .email-wrapper {
        width: 100%;
        background-color: #f4f4f5;
      }
      .email-body {
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
      }

      /* Header */
      .header {
        background-color: #18181b;
        padding: 24px 32px;
        text-align: center;
        border-radius: 8px 8px 0 0;
      }
      .header img {
        height: 36px;
      }
      .header-logo-text {
        color: #ffffff;
        font-size: 22px;
        font-weight: 700;
        font-family: Arial, sans-serif;
        text-decoration: none;
        letter-spacing: -0.5px;
      }

      /* Content */
      .content {
        background-color: #ffffff;
        padding: 40px 32px;
      }
      .content h1 {
        margin: 0 0 16px;
        font-size: 24px;
        font-weight: 700;
        color: #18181b;
        font-family: Arial, sans-serif;
      }
      .content p {
        margin: 0 0 16px;
        font-size: 15px;
        line-height: 1.6;
        color: #52525b;
        font-family: Arial, sans-serif;
      }
      .btn {
        display: inline-block;
        padding: 12px 24px;
        background-color: #2563eb;
        color: #ffffff !important;
        text-decoration: none;
        border-radius: 6px;
        font-weight: 600;
        font-size: 14px;
        font-family: Arial, sans-serif;
      }

      /* Footer */
      .footer {
        background-color: #18181b;
        padding: 24px 32px;
        text-align: center;
        border-radius: 0 0 8px 8px;
      }
      .footer p {
        margin: 0 0 8px;
        font-size: 12px;
        color: #a1a1aa;
        font-family: Arial, sans-serif;
        line-height: 1.5;
      }
      .footer a {
        color: #a1a1aa;
        text-decoration: underline;
      }
      .footer .divider {
        border: none;
        border-top: 1px solid #27272a;
        margin: 16px 0;
      }
    </style>
  </head>

  <body>
    <div class="email-wrapper">
      <table class="email-body" cellpadding="0" cellspacing="0" role="none">
        <!-- HEADER -->
        <tr>
          <td class="header">
            <a href="[[ page.logoUrl || '#' ]]" class="header-logo-text"> 🚀 Mi Empresa </a>
          </td>
        </tr>

        <!-- CONTENT (slot) -->
        <tr>
          <td class="content">
            <yield />
          </td>
        </tr>

        <!-- FOOTER -->
        <tr>
          <td class="footer">
            <p>Mi Empresa · Calle Ejemplo 123, Ciudad, País</p>
            <hr class="divider" />
            <p>
              Recibiste este email porque te registraste en nuestros servicios.<br />
              <a href="{{ unsubscribe_url }}">Cancelar suscripción</a>
            </p>
          </td>
        </tr>
      </table>
    </div>
  </body>
</html>
