<!doctype html>
<html lang="es" xmlns:v="urn:schemas-microsoft-com:vml">
  <head>
    <meta charset="utf-8" />
    <meta name="x-apple-disable-message-reformatting" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no, url=no" />
    <meta name="color-scheme" content="light dark" />
    <meta name="supported-color-schemes" content="light dark" />
    <style>
      :root {
        color-scheme: light dark;
      }

      .icon-light {
        display: block !important;
      }
      .icon-dark {
        display: none !important;
      }

      /* Para desarrollo local con clase .dark en el html (SIEMPRE tiene prioridad) */
      html.dark .icon-light {
        display: none !important;
      }
      html.dark .icon-dark {
        display: block !important;
      }
    </style>
    <style>
      @import "src/css/tailwind.css";
    </style>
  </head>

  <body class="bg-zinc-100 dark:bg-zinc-900 m-0 p-0">
    <div class="w-full bg-zinc-100 dark:bg-zinc-900 px-6 md:px-0">
      <table class="w-full max-w-2xl mx-auto" cellpadding="0" cellspacing="0" role="none">
        <!-- HEADER -->
        <tr>
          <td class="bg-slate-800 dark:bg-slate-950 px-8 py-6 text-center rounded-t-lg">
            <a
              href="[[ page.logoUrl || '#' ]]"
              class="!text-white text-2xl font-bold no-underline tracking-tight"
              style="display: inline-block"
            >
              <table cellpadding="0" cellspacing="0" role="none" style="display: inline-table">
                <tr>
                  <td style="vertical-align: middle; padding-right: 8px">
                    <img
                      src="https://api.iconify.design/lucide:rocket.svg?color=%23e5e7eb"
                      alt="Rocket"
                      width="24"
                      height="24"
                      style="display: block"
                    />
                  </td>
                  <td style="vertical-align: middle">
                    <span>Mi Empresa</span>
                  </td>
                </tr>
              </table>
            </a>
          </td>
        </tr>

        <!-- CONTENT (slot) -->
        <tr>
          <td class="bg-white dark:bg-zinc-800 px-8 py-10 dark:text-zinc-100">
            <yield />
          </td>
        </tr>

        <!-- FOOTER -->
        <tr>
          <td class="bg-slate-800 dark:bg-slate-950 px-8 py-6 text-center rounded-b-lg">
            <p class="mb-2 text-xs text-gray-300 dark:text-zinc-400 leading-snug">
              Mi Empresa · Calle Ejemplo 123, Ciudad, País
            </p>
            <hr class="border-none border-t border-slate-700 dark:border-zinc-600 my-4" />
            <p class="mb-0 text-xs text-gray-300 dark:text-zinc-400 leading-snug">
              Recibiste este email porque te registraste en nuestros servicios.<br />
              <a href="{{ unsubscribe_url }}" class="text-gray-300 dark:text-zinc-500 underline"
                >Cancelar suscripción</a
              >
            </p>
          </td>
        </tr>
      </table>
    </div>
  </body>
</html>
