<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Component Library - Email Factory</title>
    <link rel="stylesheet" href="/css/tailwind.css" />
    <link rel="stylesheet" href="/css/library.css" />

    <script>
      if (localStorage.getItem("app-theme") === "dark" || !("app-theme" in localStorage)) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    </script>
  </head>

  <body class="font-sans text-slate-800 dark:text-slate-200 bg-slate-50 dark:bg-slate-900 m-0 p-0">
    <!-- Main Container -->
    <div class="flex h-screen gap-0">
      <!-- Sidebar: Component List -->
      <aside
        class="w-80 border-r-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 flex flex-col overflow-hidden"
      >
        <div
          class="p-4 border-b-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 z-10 flex items-center justify-between gap-4 flex-wrap"
        >
          <div class="flex items-center gap-3 flex-1 min-w-0">
            <a
              href="/"
              class="text-cyan-500 no-underline flex items-center justify-center w-9 h-9 rounded border border-slate-300 dark:border-slate-600 bg-slate-100 dark:bg-slate-700 cursor-pointer transition-all hover:bg-slate-200 dark:hover:bg-slate-600 hover:border-slate-400 dark:hover:border-slate-500 flex-shrink-0"
              aria-label="Back to dashboard"
            >
              <i data-lucide="arrow-left" class="w-6 h-6 text-slate-600 dark:text-amber-400"></i>
            </a>
            <h1
              class="text-base font-bold text-slate-800 dark:text-slate-100 m-0 whitespace-nowrap tracking-tight"
            >
              <i
                data-lucide="list"
                class="w-6 h-6 inline-block align-middle text-slate-600 dark:text-amber-400"
                style="margin-right: 0.5rem"
              ></i>
              Component Library
            </h1>
          </div>
          <theme-toggle></theme-toggle>
        </div>
        <div class="w-full pt-3 px-3">
          <input
            type="text"
            id="search-input"
            class="w-full px-4 py-3 border border-slate-300 dark:border-slate-600 rounded text-sm font-inherit transition-all bg-white dark:bg-slate-700 text-slate-800 dark:text-slate-100 focus:outline-none focus:border-cyan-500 dark:focus:border-cyan-400 focus:ring-4 focus:ring-cyan-500/10 dark:focus:ring-cyan-400/10"
            placeholder="Buscar componentes..."
            aria-label="Search components"
          />
        </div>
        <div class="flex-1 overflow-y-auto p-3" id="component-list"></div>
      </aside>

      <!-- Main: Preview + Form -->
      <main class="flex-1 flex flex-col overflow-hidden">
        <!-- Content: Preview & Form -->
        <div class="flex-1 flex flex-col overflow-hidden bg-slate-50 dark:bg-slate-900">
          <!-- Preview Section -->
          <div
            class="flex-[0_0_60%] flex flex-col overflow-auto border-b border-slate-200 dark:border-slate-700 library-preview"
          >
            <div class="flex-1 flex justify-center items-stretch p-8">
              <div
                id="empty-preview"
                class="flex flex-col justify-center items-center min-h-96 text-slate-400 dark:text-slate-600 text-center"
              >
                <div class="text-5xl mb-4">
                  <i
                    data-lucide="package"
                    class="w-14 h-14 inline-block text-slate-400 dark:text-amber-400"
                  ></i>
                </div>
                <p class="text-sm m-0">Selecciona un componente para verlo aquí</p>
              </div>
              <iframe
                id="preview-iframe"
                class="bg-white rounded shadow-lg max-w-2xl w-full h-full border-0 transition-shadow hover:shadow-2xl overflow-hidden"
                style="display: none"
                title="Component Preview"
                sandbox="allow-same-origin"
              ></iframe>
            </div>
          </div>

          <!-- Form Section -->
          <div
            class="flex-[0_0_40%] bg-white dark:bg-slate-800 overflow-y-auto p-8 border-t border-slate-200 dark:border-slate-700 library-form"
          >
            <div id="form-placeholder" class="text-slate-400 dark:text-slate-600 text-sm">
              <p class="m-0">Selecciona un componente</p>
            </div>
            <div id="form-container" class=""></div>
          </div>
        </div>
      </main>
    </div>

    <!-- Main App -->
    <script type="module" src="/js/features/library/main.js"></script>
  </body>
</html>
