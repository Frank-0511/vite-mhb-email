<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Factory Dashboard</title>
    <link rel="stylesheet" href="/css/app.css" />
    <style>
      .preview-wrapper {
        position: relative;
        width: 100%;
        height: 200px;
        overflow: hidden;
        background: #fff;
        pointer-events: none;
      }

      .preview-wrapper iframe {
        position: absolute;
        top: 0;
        left: 50%;
        width: 600px;
        height: 900px;
        border: none;
        transform: translateX(-50%) scale(0.48);
        transform-origin: top center;
        pointer-events: none;
      }
    </style>
  </head>
  <body class="bg-slate-900 text-white font-sans">
    <!-- Header -->
    <header class="border-b border-slate-800 px-8 py-5 flex items-center gap-3">
      <span class="text-2xl font-bold text-sky-400">🚀 Email Factory</span>
    </header>

    <!-- Grid -->
    <main class="p-6">
      <div
        style="
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
          gap: 1.25rem;
        "
        id="template-list"
      ></div>
    </main>
  </body>
</html>
