<table class="w-full" cellpadding="0" cellspacing="0" role="none">
  <tr>
    <td class="bg-gradient-to-r from-sky-600 to-sky-500 px-8 py-12 text-center">
      <h1 class="text-3xl font-bold text-white mb-4">{{ title }}</h1>
      <p class="text-lg text-sky-100 mb-6">{{ subtitle }}</p>
      {{#if showButton}}
      <a
        href="{{ buttonUrl }}"
        class="inline-block bg-white text-sky-600 font-bold py-3 px-6 rounded-lg no-underline"
      >
        {{ buttonText }}
      </a>
      {{/if}}
    </td>
  </tr>
</table>
