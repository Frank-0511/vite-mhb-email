<table class="w-full" cellpadding="0" cellspacing="0" role="none">
  <tr>
    <td class="bg-slate-900 px-8 py-16 text-center">
      <h1 class="text-4xl font-bold text-white mb-2">{{ title }}</h1>
      <div class="border-t-2 border-sky-400 my-4 mx-auto" style="width: 80px"></div>
      <p class="text-xl text-slate-300 mb-8">{{ subtitle }}</p>
      {{#if showButton}}
      <a
        href="{{ buttonUrl }}"
        class="inline-block bg-sky-500 hover:bg-sky-600 text-white font-bold py-4 px-8 rounded-full no-underline"
      >
        {{ buttonText }} →
      </a>
      {{/if}}
    </td>
  </tr>
</table>
