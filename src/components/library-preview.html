<!-- Library Preview Component -->
<div class="library-preview">
  <div class="library-preview__wrapper">
    <div id="empty-preview" class="library-preview__empty">
      <div class="library-preview__empty-icon">📦</div>
      <p class="library-preview__empty-text">Selecciona un componente para verlo aquí</p>
    </div>
    <iframe
      id="preview-iframe"
      class="library-preview__iframe"
      style="display: none"
      title="Component Preview"
      sandbox="allow-same-origin"
    ></iframe>
  </div>
</div>
