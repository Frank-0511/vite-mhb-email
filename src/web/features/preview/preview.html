<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Preview & Edit</title>
    <!-- Use the same Tailwind output -->
    <link href="/shared/styles/tailwind.css" rel="stylesheet" />

    <!-- Vanilla JSONEditor (Svelte JSONEditor) -->
    <link
      href="https://cdn.jsdelivr.net/npm/vanilla-jsoneditor@3.11.0/themes/jse-theme-dark.css"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow: hidden;
        display: flex;
      }
      #left-panel {
        width: 35%;
        display: flex;
        flex-direction: column;
        background: #ffffff;
        border-right: 1px solid #e2e8f0;
      }
      #editor-container {
        flex: 1;
        overflow: hidden;
      }
      #right-panel {
        width: 65%;
        display: flex;
        flex-direction: column;
      }
      #preview-iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }

      /* Personalizar el tema claro de Vanilla JSONEditor */
      .jse-theme-default {
        --jse-theme-color: #0ea5e9; /* sky-500 */
        --jse-theme-color-highlight: #0284c7; /* sky-600 */
        --jse-background-color: #ffffff;
        --jse-panel-background: #f8fafc; /* slate-50 */
        --jse-main-border: none;
      }
      /* Personalizar el tema oscuro de Vanilla JSONEditor */
      .jse-theme-dark {
        --jse-theme-color: #38bdf8; /* sky-400 */
        --jse-theme-color-highlight: #0ea5e9; /* sky-500 */
        --jse-background-color: #0f172a; /* slate-900 */
        --jse-panel-background: #1e293b; /* slate-800 */
        --jse-main-border: none;
      }

      /* ── Copy HTML Dialog ─────────────────────────────────────────── */
      #dialog-copy-html {
        border: none;
        border-radius: 12px;
        padding: 0;
        width: 400px;
        max-width: calc(100vw - 32px);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
        background: #ffffff;
        color: #1e293b;
      }
      html.dark #dialog-copy-html {
        background: #1e293b;
        color: #e2e8f0;
      }
      #dialog-copy-html::backdrop {
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(2px);
      }
      .copy-html-dialog-inner {
        padding: 28px 28px 24px;
      }
      .copy-html-dialog-title {
        font-size: 1rem;
        font-weight: 700;
        margin: 0 0 6px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .copy-html-dialog-desc {
        font-size: 0.8125rem;
        color: #64748b;
        margin: 0 0 20px;
      }
      html.dark .copy-html-dialog-desc {
        color: #94a3b8;
      }
      .copy-html-actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .btn-build-copy {
        width: 100%;
        padding: 11px 16px;
        background: #0ea5e9;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: background 0.15s;
      }
      .btn-build-copy:hover:not(:disabled) {
        background: #0284c7;
      }
      .btn-build-copy:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .btn-copy-existing {
        width: 100%;
        padding: 9px 16px;
        background: transparent;
        color: #475569;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        font-size: 0.8125rem;
        font-weight: 500;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition:
          background 0.15s,
          color 0.15s;
      }
      html.dark .btn-copy-existing {
        color: #94a3b8;
        border-color: #334155;
      }
      .btn-copy-existing:hover:not(:disabled) {
        background: #f1f5f9;
        color: #1e293b;
      }
      html.dark .btn-copy-existing:hover:not(:disabled) {
        background: #334155;
        color: #e2e8f0;
      }
      .btn-copy-existing:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .copy-html-divider {
        border: none;
        border-top: 1px solid #e2e8f0;
        margin: 16px 0 14px;
      }
      html.dark .copy-html-divider {
        border-color: #334155;
      }
      .btn-copy-cancel {
        background: none;
        border: none;
        color: #94a3b8;
        font-size: 0.8125rem;
        cursor: pointer;
        padding: 0;
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      .btn-copy-cancel:hover {
        color: #64748b;
      }
      .copy-html-status {
        margin-top: 14px;
        font-size: 0.8125rem;
        border-radius: 6px;
        padding: 8px 12px;
        line-height: 1.4;
      }
      .copy-html-status.hidden {
        display: none;
      }
      .copy-html-status.loading {
        background: #f0f9ff;
        color: #0369a1;
      }
      html.dark .copy-html-status.loading {
        background: #0c2842;
        color: #7dd3fc;
      }
      .copy-html-status.success {
        background: #f0fdf4;
        color: #15803d;
      }
      html.dark .copy-html-status.success {
        background: #052e16;
        color: #86efac;
      }
      .copy-html-status.error {
        background: #fef2f2;
        color: #b91c1c;
      }
      html.dark .copy-html-status.error {
        background: #2d0a0a;
        color: #fca5a5;
      }
    </style>
    <script>
      // Prevent FOUC by applying app theme immediately
      if (localStorage.getItem("app-theme") === "dark" || !("app-theme" in localStorage)) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    </script>
  </head>
  <body class="font-sans text-slate-800 bg-slate-50 dark:bg-slate-900 dark:text-slate-200">
    <!-- Aviso de modo oscuro -->
    <div
      id="dark-mode-warning"
      style="
        display: none;
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 9999;
        background: #f87171;
        color: #fff;
        padding: 12px 20px;
        border-radius: 8px;
        font-weight: bold;
        box-shadow: 0 2px 8px #0002;
      "
    >
      ⚠️ El modo oscuro no se refleja en el preview. Puede ser por caché, emulación o clases
      Tailwind.
    </div>
    <!-- Panel Izquierdo: Editor -->
    <div id="left-panel" class="dark:border-slate-700 dark:bg-slate-900">
      <!-- Header del Editor -->
      <div
        class="px-6 py-5 border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 flex justify-between items-center"
      >
        <div class="flex items-center gap-3">
          <a
            href="/"
            class="text-sky-600 dark:text-sky-400 hover:text-sky-700 dark:hover:text-sky-300 font-semibold inline-flex items-center gap-2 transition-colors"
          >
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
          </a>
          <div class="h-5 border-l border-slate-300 dark:border-slate-600"></div>
          <h1 class="text-lg font-bold text-slate-800 dark:text-white flex items-center gap-2 m-0">
            <i data-lucide="file-text" class="w-5 h-5"></i>
            <span id="template-name"></span>
          </h1>
        </div>

        <!-- App Theme Toggle -->
        <theme-toggle></theme-toggle>
      </div>

      <!-- Contenedor del Editor -->
      <div id="editor-container"></div>

      <!-- Acciones Inferiores -->
      <div
        class="px-6 py-5 border-t border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 flex flex-col gap-3"
      >
        <button
          id="btn-save"
          class="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-3 px-4 rounded-lg shadow-sm dark:shadow-lg flex justify-center items-center gap-2 transition-all"
        >
          <i data-lucide="save" class="w-5 h-5"></i>
          <span>Guardar permanentemente en data.json</span>
        </button>
        <button
          id="btn-reset"
          class="w-full bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300 font-semibold py-2 px-4 rounded-lg transition-colors text-sm border border-slate-200 dark:border-transparent"
        >
          Descartar cambios (Recargar)
        </button>
      </div>
    </div>

    <!-- Panel Derecho: Preview -->
    <div id="right-panel" class="bg-slate-100 dark:bg-slate-800">
      <!-- Top bar del iframe -->
      <div
        class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-6 py-3 flex justify-between items-center shadow-sm dark:shadow-slate-900/50 z-10"
      >
        <div class="flex items-center gap-4">
          <span class="font-medium text-slate-700 dark:text-slate-200 flex items-center gap-2">
            <i data-lucide="eye" class="w-4 h-4"></i>
            <span>Vista previa en vivo</span>
          </span>
          <!-- Template Theme Toggle -->
          <button
            id="theme-toggle-template"
            class="p-1 px-2 rounded bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 text-xs font-semibold flex items-center transition-colors border border-slate-200 dark:border-slate-700"
            title="Toggle Template Theme"
          >
            <i id="template-icon-light" data-lucide="sun" class="hidden w-4 h-4 mr-1"></i>
            <i id="template-icon-dark" data-lucide="moon" class="hidden w-4 h-4 mr-1"></i>
            <span>Template</span>
          </button>

          <!-- Viewport Toggle -->
          <div class="flex items-center gap-2" aria-label="Viewport">
            <div
              class="inline-flex overflow-hidden rounded border border-slate-200 dark:border-slate-700"
              role="group"
              aria-label="Viewport selector"
            >
              <button
                id="viewport-desktop"
                type="button"
                class="px-2.5 py-1.5 text-xs font-semibold bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                title="Desktop (600px)"
              >
                Desktop (600px)
              </button>
              <button
                id="viewport-mobile"
                type="button"
                class="px-2.5 py-1.5 text-xs font-semibold bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors border-l border-slate-200 dark:border-slate-700"
                title="Mobile (375px)"
              >
                Mobile (375px)
              </button>
              <button
                id="viewport-custom"
                type="button"
                class="px-2.5 py-1.5 text-xs font-semibold bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors border-l border-slate-200 dark:border-slate-700"
                title="Custom"
              >
                Custom
              </button>
            </div>

            <div id="viewport-custom-input-wrap" class="hidden items-center gap-2">
              <input
                id="viewport-custom-input"
                type="number"
                inputmode="numeric"
                min="280"
                max="1200"
                step="1"
                class="w-24 px-2 py-1 text-xs rounded border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-200 focus:outline-none focus:ring-4 focus:ring-sky-500/10 dark:focus:ring-sky-400/10"
                aria-label="Custom viewport width"
              />
              <span class="text-xs font-semibold text-slate-500 dark:text-slate-400">px</span>
            </div>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <span id="sync-status" class="text-green-600 font-medium text-sm flex items-center gap-1">
            <span class="w-2 h-2 rounded-full bg-green-500"></span> Sincronizado
          </span>
          <!-- Copiar HTML -->
          <button
            id="btn-copy-html"
            type="button"
            class="p-1 px-2 rounded bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 text-xs font-semibold flex items-center gap-1 transition-colors border border-slate-200 dark:border-slate-700"
            title="Copiar HTML final"
          >
            <i data-lucide="copy" class="w-3.5 h-3.5"></i>
            Copiar HTML
          </button>
        </div>
      </div>

      <!-- Preview area -->
      <div class="flex-1 overflow-auto">
        <div class="min-h-full flex justify-center p-6">
          <div
            id="preview-frame"
            class="bg-white dark:bg-slate-900 overflow-hidden"
            style="width: 600px"
          >
            <!-- Iframe donde volcaremos el HTML vivo -->
            <iframe id="preview-iframe" title="Template Preview"></iframe>
          </div>
        </div>
      </div>

      <!-- Bottom bar: current width indicator -->
      <div
        class="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 px-6 py-2 text-xs text-slate-600 dark:text-slate-300"
      >
        Ancho actual: <span id="viewport-width-indicator" class="font-semibold">600px</span>
      </div>
    </div>

    <!-- Copy HTML Dialog -->
    <dialog id="dialog-copy-html" aria-labelledby="copy-html-dialog-title">
      <div class="copy-html-dialog-inner">
        <p id="copy-html-dialog-title" class="copy-html-dialog-title">
          <i data-lucide="copy" style="width: 18px; height: 18px; flex-shrink: 0"></i>
          Copiar HTML final
        </p>
        <p class="copy-html-dialog-desc">
          Elige cómo obtener el HTML de producción de este template.
        </p>

        <div class="copy-html-actions">
          <!-- Acción principal -->
          <button id="btn-build-and-copy" type="button" class="btn-build-copy">
            <i data-lucide="zap" style="width: 15px; height: 15px"></i>
            Buildear y copiar
          </button>

          <!-- Acción secundaria -->
          <button id="btn-copy-existing" type="button" class="btn-copy-existing">
            <i data-lucide="file-output" style="width: 14px; height: 14px"></i>
            Copiar HTML existente
          </button>
        </div>

        <!-- Estado: loading / success / error -->
        <div
          id="copy-html-status"
          class="copy-html-status hidden"
          role="status"
          aria-live="polite"
        ></div>

        <hr class="copy-html-divider" />

        <button id="btn-copy-cancel" type="button" class="btn-copy-cancel">Cancelar</button>
      </div>
    </dialog>

    <!-- Preview App Entry Point -->
    <script type="module" src="/features/preview/main.js"></script>
  </body>
</html>
